<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appalachian Infra</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #141418;
      --border: rgba(255,255,255,0.07);
      --accent: #6470f2;
      --text: #e8eaf0;
      --muted: #52546a;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* Subtle radial glow behind hero */
      background-image: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(100,112,242,0.12) 0%, transparent 70%);
    }

    /* Nav */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 28px;
    }

    .logo {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 28px 80px;
      gap: 18px;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-size: clamp(2.4rem, 9vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .hero p {
      font-size: clamp(0.9rem, 3vw, 1.05rem);
      color: var(--muted);
      max-width: 340px;
      line-height: 1.7;
    }

    /* Email form */
    .signup {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      width: 100%;
      max-width: 380px;
    }

    .signup input {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.88rem;
      padding: 11px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    .signup input::placeholder { color: var(--muted); }
    .signup input:focus { border-color: var(--accent); }

    .signup button {
      flex-shrink: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 600;
      padding: 11px 20px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      white-space: nowrap;
    }

    .signup button:hover { opacity: 0.85; transform: translateY(-1px); }

    /* Footer */
    footer {
      padding: 24px 28px;
      text-align: center;
    }

    footer p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* Mobile */
    @media (max-width: 480px) {
      nav { padding: 18px 20px; }

      .hero { padding: 40px 20px 60px; }

      .signup {
        flex-direction: column;
        max-width: 100%;
      }

      .signup button { width: 100%; padding: 13px 20px; }
    }
  </style>
</head>

<body>

  <nav>
    <a class="logo" href="#">Appalachian Infra</a>
  </nav>

  <section class="hero">
    <p class="eyebrow">Coming soon</p>
    <h1>Something's<br>being built.</h1>
    <p>Leave your email and we'll reach out when we're ready.</p>
    <form class="signup" onsubmit="return false">
      <input type="email" placeholder="you@example.com" autocomplete="email" />
      <button type="submit">Notify me</button>
    </form>
  </section>

  <footer>
    <p>© 2026 Appalachian Infra</p>
  </footer>

</body>

</html>
